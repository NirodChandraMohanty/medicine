<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - AVIJIT MEDICARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>AVIJIT <span>MEDICARE</span></span>
            </a>
        </div>
    </header>

    <div class="container" style="max-width: 600px; text-align: center; padding: 4rem 1rem;">
        <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: var(--success); margin-bottom: 1.5rem;"></i>
        <h1 style="margin-bottom: 1rem;">Order Placed Successfully!</h1>
        <p class="text-muted" style="font-size: 1.1rem; margin-bottom: 2rem;">Thank you for your purchase. Your order ID is <strong>#ORD-98765432</strong>.</p>
        
        <div class="card" style="padding: 2rem; text-align: left; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Next Steps</h3>
            <p style="margin-bottom: 0.5rem;"><i class="fa-solid fa-envelope text-primary"></i> We have sent an email confirmation.</p>
            <p><i class="fa-solid fa-truck text-primary"></i> You can track your delivery status.</p>
        </div>

        <div class="flex justify-center gap-4">
            <a href="track-order.html" class="btn btn-primary">Track Order</a>
            <a href="index.html" class="btn btn-outline">Continue Shopping</a>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
