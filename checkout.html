<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AVIJIT MEDICARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin: 2rem 0; }
        @media (max-width: 992px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>AVIJIT <span>MEDICARE</span></span>
            </a>
        </div>
    </header>

    <div class="container checkout-grid">
        <div class="card" style="padding: 2rem;">
            <h2 class="mb-4">Shipping & Payment</h2>
            <form action="order-success.html" method="GET">
                <h3 class="mt-4 mb-2" style="font-size: 1.1rem;">Delivery Address</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" required></div>
                    <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" required></div>
                </div>
                <div class="form-group"><label class="form-label">Full Address</label><input type="text" class="form-control" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group"><label class="form-label">City</label><input type="text" class="form-control" required></div>
                    <div class="form-group"><label class="form-label">PIN Code</label><input type="text" class="form-control" required></div>
                </div>
                
                <h3 class="mt-6 mb-2" style="font-size: 1.1rem;">Payment Method</h3>
                <div class="form-group">
                    <label class="form-control" style="display: flex; gap: 1rem; align-items: center; cursor: pointer;">
                        <input type="radio" name="payment" checked> Credit/Debit Card
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-control" style="display: flex; gap: 1rem; align-items: center; cursor: pointer;">
                        <input type="radio" name="payment"> UPI (Google Pay, PhonePe)
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-control" style="display: flex; gap: 1rem; align-items: center; cursor: pointer;">
                        <input type="radio" name="payment"> Cash on Delivery (COD)
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-4" style="padding: 1rem; font-size: 1.1rem;">Place Order Now</button>
            </form>
        </div>
        
        <div class="card" style="padding: 1.5rem; height: fit-content;">
            <h3 style="margin-bottom: 1rem;">Order Total</h3>
            <div class="flex justify-between mb-2"><span>2 Items</span> <span>₹210.00</span></div>
            <div class="flex justify-between mb-2"><span>Delivery</span> <span>₹40.00</span></div>
            <div class="flex justify-between font-bold mt-4 pt-4" style="border-top: 1px solid var(--border); font-size: 1.25rem;">
                <span>Total</span> <span class="text-primary">₹250.00</span>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
