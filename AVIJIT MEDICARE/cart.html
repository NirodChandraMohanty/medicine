<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - AVIJIT MEDICARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin: 2rem 0 4rem;
        }
        @media (max-width: 992px) {
            .cart-grid { grid-template-columns: 1fr; }
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-img {
            width: 80px;
            height: 80px;
            background: var(--bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
        }
        .order-summary {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 700;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 1rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>AVIJIT <span>MEDICARE</span></span>
            </a>
        </div>
    </header>

    <div class="container cart-grid">
        <!-- Cart Items -->
        <div class="card" style="padding: 0;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
                <h2 style="margin: 0;">Your Cart (2 items)</h2>
            </div>
            
            <div class="cart-item">
                <div class="cart-item-img"><i class="fa-solid fa-pills"></i></div>
                <div style="flex: 1;">
                    <h3 style="margin-bottom: 0.25rem; font-size: 1.1rem;">Paracetamol 500mg</h3>
                    <p class="text-muted" style="font-size: 0.9rem;">Strip of 10</p>
                </div>
                <div class="flex items-center gap-4">
                    <input type="number" class="form-control" value="2" min="1" style="width: 60px; text-align: center;">
                    <div style="font-weight: 700; color: var(--primary);">₹90.00</div>
                    <button class="icon-btn text-danger"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>

            <div class="cart-item">
                <div class="cart-item-img"><i class="fa-solid fa-bottle-droplet"></i></div>
                <div style="flex: 1;">
                    <h3 style="margin-bottom: 0.25rem; font-size: 1.1rem;">Cough Syrup 100ml</h3>
                    <p class="text-muted" style="font-size: 0.9rem;">1 Bottle</p>
                </div>
                <div class="flex items-center gap-4">
                    <input type="number" class="form-control" value="1" min="1" style="width: 60px; text-align: center;">
                    <div style="font-weight: 700; color: var(--primary);">₹120.00</div>
                    <button class="icon-btn text-danger"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
            <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span> <span>₹210.00</span></div>
            <div class="summary-row"><span>Delivery Fee</span> <span>₹40.00</span></div>
            <div class="summary-row"><span>Discount (AVI20)</span> <span style="color: var(--success);">-₹42.00</span></div>
            <div class="summary-total"><span>Total</span> <span class="text-primary">₹208.00</span></div>
            <a href="checkout.html" class="btn btn-primary w-full mt-6">Proceed to Checkout</a>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
