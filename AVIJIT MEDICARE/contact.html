<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AVIJIT MEDICARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>AVIJIT <span>MEDICARE</span></span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="medicines.html" class="nav-link">Medicines</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>
        </div>
    </header>

    <div class="container mt-8 mb-12">
        <h1 class="text-center mb-8">Contact Us</h1>
        <div class="grid grid-cols-2 gap-8">
            <div class="card" style="padding: 2rem;">
                <h3 class="mb-4">Get in Touch</h3>
                <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control"></div>
                <div class="form-group"><label class="form-label">Message</label><textarea class="form-control" rows="4"></textarea></div>
                <button class="btn btn-primary w-full">Send Message</button>
            </div>
            <div>
                <div class="card mb-4" style="padding: 1.5rem; display: flex; gap: 1rem; align-items: center;">
                    <i class="fa-solid fa-location-dot text-primary" style="font-size: 2rem;"></i>
                    <div><h4 class="m-0">Office Address</h4><p class="text-muted m-0">123 Health Ave, Medical City, 45001</p></div>
                </div>
                <div class="card mb-4" style="padding: 1.5rem; display: flex; gap: 1rem; align-items: center;">
                    <i class="fa-solid fa-phone text-primary" style="font-size: 2rem;"></i>
                    <div><h4 class="m-0">Phone</h4><p class="text-muted m-0">+91 98765 43210</p></div>
                </div>
                <div class="card" style="padding: 1.5rem; display: flex; gap: 1rem; align-items: center;">
                    <i class="fa-solid fa-envelope text-primary" style="font-size: 2rem;"></i>
                    <div><h4 class="m-0">Email</h4><p class="text-muted m-0">support@avijitmedicare.com</p></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
