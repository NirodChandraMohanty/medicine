<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Coupons - AVIJIT MEDICARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .coupon-card {
            display: flex;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--primary);
            overflow: hidden;
        }
        .coupon-left {
            background: var(--primary-light);
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 30%;
            border-right: 1px dashed var(--primary);
        }
        .coupon-right {
            padding: 2rem;
            flex: 1;
        }
        .coupon-code {
            background: var(--bg);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid var(--border);
            display: inline-block;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>AVIJIT <span>MEDICARE</span></span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="medicines.html" class="nav-link">Medicines</a>
                <a href="offers.html" class="nav-link active">Offers</a>
                <a href="doctors.html" class="nav-link">Consult Doctor</a>
            </nav>
        </div>
    </header>

    <div class="container mt-8 mb-12">
        <h1 class="text-center mb-8">Exclusive Offers & Coupons</h1>

        <div class="grid grid-cols-2 gap-6">
            <div class="coupon-card">
                <div class="coupon-left">
                    <h2 class="text-primary" style="font-size: 2.5rem; margin:0;">20%</h2>
                    <span class="text-primary font-bold">OFF</span>
                </div>
                <div class="coupon-right">
                    <h3 style="margin-bottom: 0.5rem;">First Order Discount</h3>
                    <p class="text-muted mb-4">Get 20% off on your first medicine order. Valid on prescription meds only.</p>
                    <div class="flex justify-between items-center">
                        <span class="coupon-code">AVI20</span>
                        <button class="btn btn-primary" style="padding: 0.4rem 1rem;">Copy Code</button>
                    </div>
                </div>
            </div>

            <div class="coupon-card">
                <div class="coupon-left" style="background: #e0f2fe; border-color: var(--secondary);">
                    <h2 style="color: var(--secondary); font-size: 2.5rem; margin:0;">15%</h2>
                    <span style="color: var(--secondary); font-weight: bold;">OFF</span>
                </div>
                <div class="coupon-right">
                    <h3 style="margin-bottom: 0.5rem;">OTC Medicines Sale</h3>
                    <p class="text-muted mb-4">Save 15% on all Over-The-Counter medicines. Minimum order ₹500.</p>
                    <div class="flex justify-between items-center">
                        <span class="coupon-code">OTC15</span>
                        <button class="btn btn-outline" style="padding: 0.4rem 1rem;">Copy Code</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
